<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh - Mis Finanzas</title>
  
  <!-- Tailwind CSS Output -->
  <link rel="stylesheet" href="css/style.css">
  
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200 min-h-screen">
  <nav class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm">
    <div class="container mx-auto flex items-center justify-between px-4">
      <a class="text-2xl font-bold dark:text-white" href="#">c4sh</a>
      <div class="flex items-center space-x-2">
        <button id="theme-toggle" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 h-9 px-3">🌓</button>
        <button id="logout-btn" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors border border-red-600 text-red-600 hover:bg-red-600 hover:text-white h-9 px-3">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container mx-auto py-10 px-4">
    <h1 class="text-3xl font-bold mb-6 dark:text-white">Mis Finanzas</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 h-full">
        <div class="p-6 text-center">
          <p class="text-xs text-gray-500 dark:text-gray-400 uppercase font-bold mb-1">Saldo Total</p>
          <h3 id="total-balance" class="text-2xl font-bold dark:text-white mb-0">$0.00</h3>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 h-full">
        <div class="p-6 text-center">
          <p class="text-xs text-gray-500 dark:text-gray-400 uppercase font-bold mb-1">Ingresos</p>
          <h3 id="total-income" class="text-2xl font-bold text-green-600 dark:text-green-400 mb-0">$0.00</h3>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 h-full">
        <div class="p-6 text-center">
          <p class="text-xs text-gray-500 dark:text-gray-400 uppercase font-bold mb-1">Gastos</p>
          <h3 id="total-expense" class="text-2xl font-bold text-red-600 dark:text-red-400 mb-0">$0.00</h3>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
      <div class="md:col-span-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
          <div class="p-6">
            <h5 class="text-lg font-semibold mb-4 dark:text-white">Nueva Transacción</h5>
            <form id="transaction-form">
              <input type="hidden" id="transaction-id">
              <div class="mb-3">
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="amount">Monto</label>
                <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="number" id="amount" step="0.01" placeholder="0.00" required>
              </div>

              <div class="mb-3">
                <div class="flex items-center justify-between mb-1">
                  <label class="block text-sm font-medium dark:text-gray-200" for="category">Categoría</label>
                  <div class="flex space-x-2">
                    <button type="button" id="edit-cat-btn" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-xs font-bold" title="Editar Categoría">✏️</button>
                    <button type="button" id="add-cat-btn" class="text-blue-600 hover:text-blue-700 text-xs font-bold">+ Agregar</button>
                  </div>
                </div>
                <select id="category" class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                  <option value="">Seleccionar...</option>
                </select>
              </div>

              <div class="mb-3">
                <div class="flex items-center justify-between mb-1">
                  <label class="block text-sm font-medium dark:text-gray-200" for="payment-method">Medio de Pago</label>
                  <div class="flex space-x-2">
                    <button type="button" id="edit-pm-btn" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-xs font-bold" title="Editar Medio de Pago">✏️</button>
                    <button type="button" id="add-pm-btn" class="text-blue-600 hover:text-blue-700 text-xs font-bold">+ Agregar</button>
                  </div>
                </div>
                <select id="payment-method" class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                  <option value="">Seleccionar...</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="date">Fecha</label>
                <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="date" id="date">
              </div>

              <div class="mb-3">
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="description">Descripción</label>
                <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="text" id="description" placeholder="Ej: Supermercado, Sueldo...">
              </div>

              <div class="mt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">Guardar Transacción</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="md:col-span-8">
        <h5 class="text-lg font-semibold mb-4 dark:text-white">Actividad Reciente</h5>
        <div id="transaction-list">
          <div class="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800 text-center shadow-sm">
            No hay transacciones todavía.
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modales -->
  <!-- Modal Categoría -->
  <div id="category-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-black/50 backdrop-blur-sm" aria-hidden="true" onclick="closeModal('category-modal')"></div>
      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-gray-200 dark:border-gray-700">
        <form id="category-modal-form" class="p-6">
          <input type="hidden" id="modal-category-id">
          <h3 class="text-lg font-bold leading-6 text-gray-900 dark:text-white mb-4" id="category-modal-title">Nueva Categoría</h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-category-name">Nombre</label>
              <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="text" id="modal-category-name" placeholder="Ej: Alimentación, Transporte..." required>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-category-type">Tipo</label>
                <select id="modal-category-type" class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                  <option value="expense">Gasto</option>
                  <option value="income">Ingreso</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-category-icon">Icono (Emoji)</label>
                <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="text" id="modal-category-icon" placeholder="Ej: 🍕, 🚗, 💰" value="🏷️">
              </div>
            </div>
          </div>

          <div class="mt-6 flex flex-row-reverse space-x-2 space-x-reverse">
            <button type="submit" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors">Guardar</button>
            <button type="button" onclick="closeModal('category-modal')" class="w-full sm:w-auto bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 font-bold py-2 px-6 rounded transition-colors">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Medio de Pago -->
  <div id="payment-method-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-black/50 backdrop-blur-sm" aria-hidden="true" onclick="closeModal('payment-method-modal')"></div>
      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-gray-200 dark:border-gray-700">
        <form id="payment-method-modal-form" class="p-6">
          <input type="hidden" id="modal-pm-id">
          <h3 class="text-lg font-bold leading-6 text-gray-900 dark:text-white mb-4" id="pm-modal-title">Nuevo Medio de Pago</h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-pm-name">Nombre</label>
              <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="text" id="modal-pm-name" placeholder="Ej: Efectivo, Tarjeta BBVA..." required>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-pm-type">Tipo</label>
                <select id="modal-pm-type" class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                  <option value="cash">Efectivo</option>
                  <option value="debit">Débito</option>
                  <option value="credit">Crédito</option>
                  <option value="other">Otro</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200" for="modal-pm-icon">Icono (Emoji)</label>
                <input class="block w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" type="text" id="modal-pm-icon" placeholder="Ej: 💵, 💳, 🏦" value="💳">
              </div>
            </div>
          </div>

          <div class="mt-6 flex flex-row-reverse space-x-2 space-x-reverse">
            <button type="submit" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors">Guardar</button>
            <button type="button" onclick="closeModal('payment-method-modal')" class="w-full sm:w-auto bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 font-bold py-2 px-6 rounded transition-colors">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
  <script type="module" src="js/finance.js"></script>
</body>
</html>
