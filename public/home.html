<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh — Transacciones</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="text-slate-900 dark:text-slate-100 transition-colors duration-300">
  
  <!-- MASTER HEADER -->
  <header class="app-header sticky top-0 z-50">
    <div class="container mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center" style="gap:2rem">
        <a href="/home.html" class="flex items-center gap-3">
          <span class="text-2xl font-black tracking-tighter uppercase italic">c4sh</span>
        </a>
        <div style="width:1px;height:20px;background:rgba(255,255,255,0.25)"></div>
        <nav class="flex items-center gap-6">
          <a href="/home.html" class="nav-link nav-link-active">Transacciones</a>
          <a href="/estimated.html" class="nav-link px-4">Presupuesto</a>
        </nav>
      </div>
      <div class="flex items-center gap-6">
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/10 transition-colors">🌓</button>
        <button id="logout-btn" class="text-[10px] font-black text-white bg-color-danger px-4 py-2 rounded-lg hover:opacity-80 transition-all uppercase tracking-widest">Salir</button>
      </div>
    </div>
  </header>

  <!-- MASTER TOOLBELT BAR -->
  <section class="toolbelt-bar">
    <div class="container mx-auto px-6 flex flex-wrap items-center justify-between gap-6">
      <div class="flex flex-wrap items-center gap-3">
        <div class="stat-pill">
          <span class="stat-label">Neto</span>
          <span id="total-balance" class="stat-value text-slate-900">$0.00</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Ingresos</span>
          <span id="total-income" class="stat-value color-primary">$0.00</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Gastos</span>
          <span id="total-expense" class="stat-value color-danger">$0.00</span>
        </div>
      </div>
      <button id="open-transaction-modal-btn" class="btn-brand text-[11px] uppercase tracking-widest">
        + Nueva Transacción
      </button>
    </div>
  </section>

  <!-- MAIN CONTAINER -->
  <main class="container mx-auto px-6 pb-20">
    <div class="main-container">
      <div class="flex items-center justify-between mb-12 border-b border-slate-100 dark:border-slate-800 pb-8">
        <div>
          <h1 class="text-4xl font-black tracking-tighter uppercase italic">Actividad Reciente</h1>
          <p class="text-slate-400 font-medium mt-1">Control detallado de tus movimientos diarios.</p>
        </div>
        <div class="h-2 w-24 bg-color-primary rounded-full"></div>
      </div>

      <div id="transaction-list" class="grid grid-cols-1 gap-4">
        <!-- Renderizado dinámico -->
      </div>
    </div>
  </main>

  <!-- Modal Transacción -->
  <div id="transaction-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeModal('transaction-modal')"></div>
      <div class="relative bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl w-full max-w-lg p-12 border-t-8 border-color-warning">
        <form id="transaction-form" class="space-y-8">
          <input type="hidden" id="transaction-id">
          <h3 class="text-3xl font-black tracking-tighter uppercase italic">Transacción</h3>
          
          <div class="p-8 bg-slate-50 dark:bg-slate-950 rounded-[2rem] border-2 border-color-warning-soft">
            <label class="block text-[10px] font-black uppercase color-warning mb-2 tracking-widest">Monto de Operación</label>
            <div class="flex items-center gap-3">
              <span class="text-4xl text-slate-300 font-light">$</span>
              <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-5xl font-black tabular-nums tracking-tighter" type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Categoría</label>
                <button type="button" id="add-cat-btn" class="color-primary text-[9px] font-black uppercase">+ Nueva</button>
              </div>
              <select id="category" class="w-full font-bold text-sm" required></select>
            </div>
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Medio de Pago</label>
                <button type="button" id="add-pm-btn" class="color-primary text-[9px] font-black uppercase">+ Nuevo</button>
              </div>
              <select id="payment-method" class="w-full font-bold text-sm" required></select>
            </div>
            <div>
              <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Fecha</label>
              <input class="w-full font-bold text-sm" type="date" id="date">
            </div>
            <div>
              <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Nota</label>
              <input class="w-full font-bold text-sm" type="text" id="description" placeholder="Ej: Compra mensual">
            </div>
          </div>

          <div class="mt-12 flex gap-4">
            <button type="button" onclick="closeModal('transaction-modal')" class="flex-1 py-5 font-black text-slate-400 hover:text-slate-900 transition-colors uppercase">Cancelar</button>
            <button type="submit" id="submit-transaction-btn" class="flex-1 py-5 bg-color-primary text-white font-black rounded-2xl shadow-xl shadow-orange-500/30 uppercase tracking-widest">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/finance.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
