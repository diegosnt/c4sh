<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh — Transacciones</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="transition-colors duration-300">
  
  <!-- MASTER HEADER -->
  <header class="app-header sticky top-0 z-50">
    <div class="container mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center" style="gap:2rem">
        <a href="/home.html" class="flex items-center gap-3">
          <span class="text-2xl font-black tracking-tighter uppercase italic">c4sh</span>
        </a>
        <div style="width:1px;height:20px;background:rgba(255,255,255,0.25)"></div>
        <nav class="flex items-center gap-6">
          <a href="/home.html" class="nav-link nav-link-active">Transacciones</a>
          <a href="/estimated.html" class="nav-link px-4">Presupuesto</a>
          <a href="/settings.html" class="nav-link">Ajustes</a>
        </nav>
      </div>
      <div class="flex items-center gap-6">
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/10 transition-colors">🌓</button>
        <button id="logout-btn" class="text-[10px] font-black text-white bg-color-danger px-4 py-2 rounded-lg hover:opacity-80 transition-all uppercase tracking-widest">Salir</button>
      </div>
    </div>
  </header>

  <!-- MASTER TOOLBELT BAR -->
  <section class="toolbelt-bar">
    <div class="container mx-auto px-6 flex flex-wrap items-center justify-between gap-6">
      <div class="flex flex-wrap items-center gap-3">
        <div class="stat-pill">
          <span class="stat-label">Neto</span>
          <span id="total-balance" class="stat-value">$0.00</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Ingresos</span>
          <span id="total-income" class="stat-value color-primary">$0.00</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Gastos</span>
          <span id="total-expense" class="stat-value color-danger">$0.00</span>
        </div>
      </div>
      <button id="open-transaction-modal-btn" class="btn-brand text-[11px] uppercase tracking-widest">
        + Nueva Transacción
      </button>
    </div>
  </section>

  <!-- MAIN CONTAINER -->
  <main class="container mx-auto px-6 pb-20">
    <div class="main-container">
      <div id="transaction-list" class="p-1" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem">
        <!-- Renderizado dinámico -->
      </div>
    </div>
  </main>

  <!-- Modal Transacción -->
  <div id="transaction-modal" class="modal-overlay">
    <div class="modal-overlay__backdrop" onclick="closeModal('transaction-modal')"></div>
    <div class="modal-overlay__wrap">
      <div class="modal-card" style="max-width:500px">
        <form id="transaction-form">
          <input type="hidden" id="transaction-id">
          <h3 id="transaction-modal-title" class="modal-card__title">Transacción</h3>

          <div class="modal-value-block" style="margin-bottom:1.5rem">
            <label class="modal-card__label">Monto de Operación</label>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <span style="font-size:2.25rem;opacity:0.25;font-weight:300">$</span>
              <input class="modal-value-input" type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
          </div>

          <div class="modal-field-row">
            <div class="modal-field" style="flex:1">
              <label class="modal-card__label">Categoría</label>
              <select id="category" required></select>
            </div>
            <div class="modal-field" style="flex:1">
              <label class="modal-card__label">Medio de Pago</label>
              <select id="payment-method" required></select>
            </div>
          </div>

          <div class="modal-field-row">
            <div class="modal-field" style="flex:1">
              <label class="modal-card__label">Fecha</label>
              <input type="date" id="date">
            </div>
            <div class="modal-field" style="flex:1">
              <label class="modal-card__label">Nota</label>
              <input type="text" id="description" placeholder="Ej: Compra mensual">
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" onclick="closeModal('transaction-modal')" class="modal-btn-cancel">Cancelar</button>
            <button type="submit" id="submit-transaction-btn" class="modal-btn-submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/finance.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
