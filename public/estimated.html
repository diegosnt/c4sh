<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh — Presupuesto</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="text-slate-900 dark:text-slate-100 transition-colors duration-300">
  
  <!-- MASTER HEADER -->
  <header class="app-header sticky top-0 z-50">
    <div class="container mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center" style="gap:2rem">
        <a href="/home.html" class="flex items-center gap-3">
          <span class="text-2xl font-black tracking-tighter uppercase italic">c4sh</span>
        </a>
        <div style="width:1px;height:20px;background:rgba(255,255,255,0.25)"></div>
        <nav class="flex items-center gap-6">
          <a href="/home.html" class="nav-link">Transacciones</a>
          <a href="/estimated.html" class="nav-link nav-link-active px-4">Presupuesto</a>
        </nav>
      </div>
      <div class="flex items-center gap-6">
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/10 transition-colors">🌓</button>
        <button id="logout-btn" class="text-[10px] font-black text-white bg-color-danger px-4 py-2 rounded-lg hover:opacity-80 transition-all uppercase tracking-widest">Salir</button>
      </div>
    </div>
  </header>

  <!-- MASTER TOOLBELT BAR -->
  <section class="toolbelt-bar">
    <div class="container mx-auto px-6 flex flex-wrap items-center justify-between gap-6">
      <div class="flex flex-wrap items-center gap-3">
        <div class="stat-pill">
          <span class="stat-label">Planificado</span>
          <span id="stat-estimated" class="stat-value text-slate-900">$0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Ejecutado</span>
          <span id="stat-real" class="stat-value color-primary">$0</span>
        </div>
        <div id="stat-diff-pill" class="stat-pill">
          <span class="stat-label">Diferencia</span>
          <span id="stat-diff" class="stat-value">$0</span>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 px-3 bg-white/50 rounded-lg shadow-sm py-[10px]">
          <span class="text-[8px] font-black opacity-50 uppercase tracking-widest">Año</span>
          <select id="months-select" class="bg-transparent border-none p-0 text-[11px] font-black focus:ring-0 cursor-pointer appearance-none"></select>
        </div>
        <button id="add-item-btn" class="btn-brand text-[11px] uppercase tracking-widest">
          + NUEVO ITEM
        </button>
      </div>
    </div>
  </section>

  <!-- MAIN CONTAINER -->
  <main class="container mx-auto px-6 pb-20">
    <div class="main-container">
      <div class="flex items-center justify-between mb-10">
        <div>
          <h1 class="text-4xl font-black tracking-tighter uppercase italic">Presupuesto Anual <span class="color-primary" id="year-display">2024</span></h1>
          <p class="text-slate-400 font-medium mt-1">Planificación y seguimiento de gastos proyectados.</p>
        </div>
        <div class="h-2 w-24 bg-color-primary rounded-full"></div>
      </div>

      <div id="no-items" class="hidden py-20 text-center bg-slate-50 dark:bg-slate-950/50 rounded-[3rem] border-2 border-dashed border-slate-200">
        <p class="text-xl font-bold text-slate-400 italic">Empezá definiendo tus rubros anuales.</p>
      </div>

      <div id="matrix-section">
        <div class="table-container bg-white dark:bg-slate-950 shadow-2xl">
          <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
              <thead>
                <tr id="matrix-header" class="bg-slate-50 dark:bg-black border-b-2 border-slate-100 dark:border-slate-800"></tr>
              </thead>
              <tbody id="matrix-body" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
              <tfoot>
                <tr id="matrix-footer" class="bg-slate-50 dark:bg-black font-black border-t-2"></tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modals -->
  <div id="item-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeItemModal()"></div>
      <div class="relative bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl w-full max-w-sm p-12 border-t-8 border-color-warning">
        <form id="item-modal-form" class="space-y-8">
          <input type="hidden" id="modal-item-id">
          <h3 id="item-modal-title" class="text-3xl font-black mb-8 uppercase tracking-tighter italic">Nuevo Rubro</h3>
          <div>
            <label class="block text-[10px] font-black uppercase color-warning mb-2 tracking-widest">Nombre</label>
            <input class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-950 border-2 border-slate-100 dark:border-slate-800 rounded-2xl focus:border-color-primary outline-none text-xl font-bold" type="text" id="modal-item-name" required>
          </div>
          <div class="mt-12 flex gap-4">
            <button type="button" onclick="closeItemModal()" class="flex-1 py-5 font-black text-zinc-400">CERRAR</button>
            <button type="submit" class="flex-1 py-5 bg-color-primary text-white font-black rounded-2xl shadow-xl">GUARDAR</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="value-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen p-4">
      <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeValueModal()"></div>
      <div class="relative bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl w-full max-w-md p-12 border-t-8 border-color-primary">
        <form id="value-modal-form" class="space-y-8">
          <input type="hidden" id="modal-value-id">
          <input type="hidden" id="modal-value-item-id">
          <input type="hidden" id="modal-value-period">
          <h3 class="text-3xl font-black mb-2 uppercase tracking-tighter italic">Monto</h3>
          <p id="value-modal-subtitle" class="text-xs font-black color-primary mb-10 uppercase tracking-widest opacity-70"></p>
          <div class="space-y-8">
            <div class="p-6 bg-slate-50 dark:bg-slate-950 rounded-[2rem] border-2 border-color-warning-soft">
              <label class="block text-[10px] font-black uppercase color-warning mb-2 tracking-widest">Planificado</label>
              <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-4xl font-black color-warning tabular-nums" type="number" id="modal-value-estimated" required>
            </div>
            <div class="p-6 bg-slate-50 dark:bg-slate-950 rounded-[2rem] border-2 border-color-primary-soft">
              <label class="block text-[10px] font-black uppercase color-primary mb-2 tracking-widest">Ejecutado</label>
              <input class="w-full bg-transparent border-none p-0 focus:ring-0 text-4xl font-black color-primary tabular-nums" type="number" id="modal-value-real" required>
            </div>
          </div>
          <div class="mt-12 flex gap-4">
            <button type="button" onclick="closeValueModal()" class="flex-1 py-5 font-black text-zinc-400">CANCELAR</button>
            <button type="submit" class="flex-1 py-5 bg-color-primary text-white font-black rounded-2xl shadow-xl">ACTUALIZAR</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/estimated.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
