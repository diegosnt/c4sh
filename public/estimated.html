<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh — Presupuesto</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="transition-colors duration-300">
  
  <!-- MASTER HEADER -->
  <header class="app-header sticky top-0 z-50">
    <div class="container mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center" style="gap:2rem">
        <a href="/home.html" class="flex items-center gap-3">
          <span class="text-2xl font-black tracking-tighter uppercase italic">c4sh</span>
        </a>
        <div style="width:1px;height:20px;background:rgba(255,255,255,0.25)"></div>
        <nav class="flex items-center gap-6">
          <a href="/home.html" class="nav-link">Transacciones</a>
          <a href="/estimated.html" class="nav-link nav-link-active px-4">Presupuesto</a>
          <a href="/settings.html" class="nav-link">Ajustes</a>
        </nav>
      </div>
      <div class="flex items-center gap-6">
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/10 transition-colors">🌓</button>
        <button id="logout-btn" class="text-[10px] font-black text-white bg-color-danger px-4 py-2 rounded-lg hover:opacity-80 transition-all uppercase tracking-widest">Salir</button>
      </div>
    </div>
  </header>

  <!-- MASTER TOOLBELT BAR -->
  <section class="toolbelt-bar">
    <div class="container mx-auto px-6 flex flex-wrap items-center justify-between gap-6">
      <div class="flex flex-wrap items-center gap-3">
        <div class="stat-pill">
          <span class="stat-label">Mes actual</span>
          <span id="stat-estimated" class="stat-value">$0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Pagado</span>
          <span id="stat-real" class="stat-value color-primary">$0</span>
        </div>
        <div id="stat-diff-pill" class="stat-pill">
          <span class="stat-label">Pendiente</span>
          <span id="stat-diff" class="stat-value">$0</span>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 px-3 bg-surface-card rounded-lg shadow-sm py-[10px]">
          <span class="text-[8px] font-black opacity-50 uppercase tracking-widest">Año</span>
          <select id="months-select" class="bg-transparent border-none p-0 text-[11px] font-black focus:ring-0 cursor-pointer appearance-none"></select>
        </div>
        <button id="add-item-btn" class="btn-brand text-[11px] uppercase tracking-widest">
          + NUEVO ITEM
        </button>
      </div>
    </div>
  </section>

  <!-- MAIN CONTAINER -->
  <main class="container mx-auto px-6 pb-8">
    <div class="main-container">

      <div id="no-items" class="hidden py-20 text-center bg-surface-input rounded-[3rem] border-2 border-dashed border-ui">
        <p class="text-xl font-bold text-slate-400 italic">Empezá definiendo tus rubros anuales.</p>
      </div>

      <div id="matrix-section">
        <div class="table-container bg-surface-card shadow-2xl">
          <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
              <thead>
                <tr id="matrix-header" class="bg-surface-input border-b-2 border-ui"></tr>
              </thead>
              <tbody id="matrix-body" class="divide-y divide-ui"></tbody>
              <tfoot>
                <tr id="matrix-footer" class="bg-surface-input font-black border-t-2 border-ui"></tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modals -->
  <div id="item-modal" class="modal-overlay">
    <div class="modal-overlay__backdrop" onclick="closeItemModal()"></div>
    <div class="modal-overlay__wrap">
      <div class="modal-card" style="max-width:460px">
        <form id="item-modal-form">
          <input type="hidden" id="modal-item-id">
          <h3 id="item-modal-title" class="modal-card__title">Nuevo Rubro</h3>

          <div class="modal-field-row">
            <div class="modal-field" style="flex:0 0 68px">
              <label class="modal-card__label">Ícono</label>
              <input class="modal-input-emoji" type="text" id="modal-item-icon" placeholder="😀" maxlength="4">
            </div>
            <div class="modal-field" style="flex:0 0 76px">
              <label class="modal-card__label">Orden</label>
              <input type="number" id="modal-item-order" min="1" step="1" placeholder="—">
            </div>
            <div class="modal-field" style="flex:1">
              <label class="modal-card__label">Nombre</label>
              <input type="text" id="modal-item-name" required>
            </div>
          </div>

          <div class="modal-field">
            <label class="modal-card__label">Tipo</label>
            <select id="modal-item-type">
              <option value="">— Sin tipo —</option>
            </select>
          </div>

          <div id="new-type-row" class="modal-new-type-row" style="display:none">
            <input type="text" id="new-type-name" placeholder="Nombre del tipo" style="flex:1">
            <button type="button" id="new-type-save" class="modal-btn-submit" style="padding:10px 16px;font-size:0.7rem;white-space:nowrap">Agregar</button>
          </div>

          <button type="button" id="toggle-new-type" class="new-type-toggle">＋ Nuevo tipo</button>

          <div class="modal-field">
            <label class="modal-card__label">Notas</label>
            <textarea id="modal-item-notes" class="modal-textarea" rows="2" placeholder="Observaciones..."></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" onclick="closeItemModal()" class="modal-btn-cancel">Cerrar</button>
            <button type="submit" class="modal-btn-submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="value-modal" class="modal-overlay">
    <div class="modal-overlay__backdrop" onclick="closeValueModal()"></div>
    <div class="modal-overlay__wrap">
      <div class="modal-card modal-card--primary" style="max-width:480px">
        <form id="value-modal-form">
          <input type="hidden" id="modal-value-id">
          <input type="hidden" id="modal-value-item-id">
          <input type="hidden" id="modal-value-period">
          <input type="hidden" id="modal-value-paid">
          <h3 class="modal-card__title" style="margin-bottom:0.5rem">Monto</h3>
          <p id="value-modal-subtitle" class="color-primary" style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-bottom:2rem"></p>
          <div style="display:flex;flex-direction:column;gap:1.5rem;margin-bottom:1rem">
            <div class="modal-value-block">
              <label class="modal-card__label">Planificado</label>
              <input class="modal-value-input" type="number" id="modal-value-estimated" step="0.01" min="0" required>
            </div>
            <div class="modal-value-block modal-value-block--primary">
              <label class="modal-card__label" style="color:var(--primary)">Ejecutado</label>
              <input class="modal-value-input modal-value-input--primary" type="number" id="modal-value-real" step="0.01" min="0" required>
            </div>
          </div>
          <div class="flex gap-4" style="margin-top:3rem">
            <button type="button" onclick="closeValueModal()" class="modal-btn-cancel">Cancelar</button>
            <button type="submit" class="modal-btn-submit">Actualizar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/estimated.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
