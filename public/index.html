<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh - Login</title>
  
  <!-- Simple.css: Minimalismo puro -->
  <link rel="stylesheet" href="css/simple.min.css">
  
  <style>
    /* Estilos para el Modo Manual de Simple.css */
    :root[data-theme="light"] {
      --bg: #ffffff;
      --accent-bg: #f5f7f9;
      --text: #212121;
      --text-light: #585858;
      --border: #d8dee9;
      --accent: #0d47a1;
    }
    :root[data-theme="dark"] {
      --bg: #212121;
      --accent-bg: #2b2b2b;
      --text: #dcdcdc;
      --text-light: #ababab;
      --border: #444;
      --accent: #ffb300;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    main {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    .error {
      color: #e74c3c;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1rem;
    }
    h1 {
      text-align: center;
    }
    .theme-toggle-container {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .btn-small {
      padding: 0.2rem 0.5rem;
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-light);
      cursor: pointer;
      font-size: 0.8rem;
    }
  </style>

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="theme-toggle-container">
    <button id="theme-toggle" class="btn-small">🌓</button>
  </div>

  <main>
    <article>
      <h1>c4sh</h1>
      <p style="text-align: center; color: var(--text-light);">Registro de finanzas</p>
      
      <div id="error" class="error"></div>
      
      <form id="login-form">
        <p>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required>
        </p>
        <p>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </p>
        <button type="submit" id="submit-btn">Iniciar sesión</button>
      </form>
    </article>
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
