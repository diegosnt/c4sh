<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c4sh — Login</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body class="login-page">

  <button id="theme-toggle" style="position:absolute;top:1rem;right:1rem;z-index:10;width:2.5rem;height:2.5rem;display:flex;align-items:center;justify-content:center;border-radius:0.75rem;background:rgba(255,255,255,0.15);border:none;cursor:pointer;font-size:1rem;">🌓</button>

  <div class="login-card">
    <div style="margin-bottom:32px">
      <p class="login-title">c4sh</p>
      <p class="login-subtitle">Control de finanzas personales</p>
    </div>

    <div id="error" class="login-error"></div>

    <form id="login-form" style="display:flex;flex-direction:column;gap:20px">
      <div>
        <label class="login-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@email.com"
          required
          class="w-full font-bold text-sm"
          style="width:100%"
        >
      </div>

      <div>
        <label class="login-label" for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          class="w-full font-bold text-sm"
          style="width:100%"
        >
      </div>

      <button
        type="submit"
        id="submit-btn"
        class="btn-brand"
        style="width:100%;margin-top:8px;text-align:center;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase"
      >
        Iniciar sesión
      </button>
    </form>
  </div>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-bs-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
